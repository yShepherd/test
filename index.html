<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/dyegoou.webp" type="image/webp">
<title>@dyegoou | Links</title>

<style>
:root {
    --bg-dark: #0f172a;
    --bg-secondary: #1e293b;
    --accent: #38bdf8;
    --text: #f8fafc;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow: hidden;
    background: radial-gradient(circle at top, #1e293b, #020617);
}

/* CANVAS */
#bgCanvas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* GLOW DO MOUSE */
.glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* CENTRALIZA */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    width: 100%;
    max-width: 380px;
    text-align: center;
    padding: 40px 25px;
    border-radius: 28px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

/* PERFIL */
.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.profile-img:hover {
    transform: scale(1.1);
}

/* TEXTOS */
h1 { margin: 0; }
p { color: #94a3b8; }

/* LINKS */
.links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 25px;
}

.link-card {
    padding: 16px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
}

.link-card:hover {
    transform: translateY(-4px);
}

/* CORES VIVAS */
/* CORES VIVAS */
.instagram:hover {
    background: linear-gradient(45deg,#E1306C,#F77737);
    box-shadow: 0 0 20px #E1306C;
}

.x:hover {
    background: #000000;
    box-shadow: 0 0 20px #ffffff;
}

.github:hover {
    background: #171515;
    box-shadow: 0 0 20px #ffffff;
}

.whatsapp:hover {
    background: #25D366;
    box-shadow: 0 0 20px #25D366;
}

/* LIGHTBOX */
.image-overlay {
    display: none;
    position: fixed;
    inset: 0;

    /* FUNDO QUASE TRANSPARENTE */
    background: rgba(15, 23, 42, 0.15); /* leve tom escuro elegante */

    /* BLUR SUAVE */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    justify-content: center;
    align-items: center;
}

/* IMAGE DOWNLOAD*/
.download-btn {
    position: absolute;
    top: 25px;
    right: 90px;

    width: 50px;
    height: 50px;

    border-radius: 50%;
    text-decoration: none;
    font-size: 22px;

    display: flex;
    align-items: center;
    justify-content: center;

    color: white;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);

    transition: 0.3s;
}
    
.expanded-img {
    max-width: 85%;
    border-radius: 20px;
    transform: scale(0.7);
    transition: 0.3s;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
    cursor: pointer;
}

/* FOOTER */
footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 0.85rem;
    color: #94a3b8;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="glow" id="glow"></div>

<div class="wrapper">
<div class="container">

<img src="images/dyegoou.webp" class="profile-img" id="profilePic">

<h1>@dyegoou</h1>
<p>Vamos beber victoriaaaaaaaaaaaaaa</p>

<div class="links">
    <a href="https://instagram.com/dyegoou" class="link-card instagram" target="_blank">Instagram</a>
    <a href="https://x.com/dyegoouu" class="link-card x" target="_blank">X (Twitter)</a>
    <a href="https://wa.me/11932078062" class="link-card whatsapp" target="_blank">WhatsApp</a>
    <a href="https://github.com/yShepherd" class="link-card github" target="_blank">GitHub</a>
</div>

</div>
</div>

<footer>
© 2026 @dyegoou — Todos os direitos reservados
</footer>

<div class="image-overlay" id="overlay">
    <span class="close-btn" id="closeBtn">&times;</span>
    
    <a href="images/dyegoou.webp" download class="download-btn">⬇</a>

    <img src="images/dyegoou.webp" class="expanded-img" id="fullImg">
</div>

<script>
/* FUNDO ESCURO COM PARTÍCULAS */
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for (let i = 0; i < 150; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedX: Math.random() - 0.5,
        speedY: Math.random() - 0.5
    });
}

function animate() {
    ctx.fillStyle = "rgba(2,6,23,0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "#38bdf8";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

/* GLOW DO MOUSE */
const glow = document.getElementById("glow");

document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

/* LIGHTBOX */
const profilePic = document.getElementById('profilePic');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closeBtn');
const fullImg = document.getElementById('fullImg');

profilePic.onclick = () => {
    overlay.style.display = 'flex';
    setTimeout(() => fullImg.style.transform = 'scale(1)', 10);
};

function closeLightbox() {
    fullImg.style.transform = 'scale(0.7)';
    setTimeout(() => overlay.style.display = 'none', 300);
}

closeBtn.onclick = closeLightbox;

overlay.onclick = (e) => {
    if (e.target !== fullImg) closeLightbox();
};
</script>

</body>
</html>
