<!DOCTYPE html>
<html lang="pt-br">
<head>

<style>
:root {
    --bg-dark: #0f172a;
    --bg-secondary: #1e293b;
    --accent: #38bdf8;
    --text: #f8fafc;

}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
    background: radial-gradient(circle at top, #1e293b, #020617);
}

/* ===== TOPBAR CORRIGIDA ===== */

.topbar.hidden {
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.topbar {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 10px 15px;

    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.15);

    z-index: 999;
}

.topbar a {
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e2e8f0;
    text-decoration: none;
    font-size: 0.85rem;
    transition: 0.3s;
}

.topbar a:hover {
    background: rgba(56,189,248,0.2);
    color: var(--accent);
}

.topbar-right {
    display: flex;
    gap: 10px;
}

/* CANVAS */
#bgCanvas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* GLOW */
.glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* CENTRALIZA */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding-top: 120px;
}

/* CARD */
.container {
    width: 100%;
    max-width: 380px;
    text-align: center;
    padding: 40px 25px;
    border-radius: 28px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
}

/* PERFIL */
.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    margin-bottom: 20px;
    cursor: pointer;
}

/* LINKS */
.links {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* BOTÕES */
.link-card {
    padding: 16px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
}

/* CORES */
.instagram:hover { background: #E1306C; }
.x:hover { background: #000; }
.whatsapp:hover { background: #25D366; }
.github:hover { background: #171515; }

/* LIGHTBOX */
.image-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.12);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
}

.download-btn {
    position: absolute;
    top: 25px;
    right: 90px;
}

.expanded-img {
    max-width: 85%;
    border-radius: 20px;
    transform: scale(0.7);
    transition: 0.3s;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
    cursor: pointer;
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 20px 0;
    text-align: center;
    font-size: 0.85rem;
    color: #94a3b8
}
</style>
</head>

<body>

<div class="topbar">

    <div class="topbar-right">
        <a href="aboutme.html">Sobre mim</a>
        <a href="works.html">Works</a>

<canvas id="bgCanvas"></canvas>

</div>

</div>
</div>

<footer>© 2026 @dyegoou</footer>

<div class="image-overlay" id="overlay">
<span class="close-btn" id="closeBtn">&times;</span>
<a href="images/dyegoou.webp" download class="download-btn">⬇</a>
<img src="images/dyegoou.webp" class="expanded-img" id="fullImg">
</div>

<script>
// SEU JS ORIGINAL (mantido)
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i = 0; i < 150; i++) {
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2,
speedX: Math.random()-0.5,
speedY: Math.random()-0.5
});
}

function animate(){
ctx.fillStyle="rgba(2,6,23,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.speedX;
p.y+=p.speedY;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

const profilePic=document.getElementById('profilePic');
const overlay=document.getElementById('overlay');
const closeBtn=document.getElementById('closeBtn');
const fullImg=document.getElementById('fullImg');
const topbar=document.querySelector('.topbar');

profilePic.onclick = () => {
    overlay.style.display = 'flex';
    topbar.classList.add('hidden'); // REMOVE THE TOP
    setTimeout(() => fullImg.style.transform = 'scale(1)', 10);
};

function closeLightbox(){
fullImg.style.transform = 'scale(0.7)';
topbar.classList.remove('hidden'); // RE-ADD THE TOP
setTimeout(() => overlay.style.display = 'none', 300);
}  

closeBtn.onclick=closeLightbox;
overlay.onclick=(e)=>{if(e.target!==fullImg)closeLightbox();}
</script>

</body>
</html>
