<script>
// SEU JS ORIGINAL (mantido)
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i = 0; i < 150; i++) {
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2,
speedX: Math.random()-0.5,
speedY: Math.random()-0.5
});
}

function animate(){
ctx.fillStyle="rgba(2,6,23,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.speedX;
p.y+=p.speedY;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

const profilePic=document.getElementById('profilePic');
const overlay=document.getElementById('overlay');
const closeBtn=document.getElementById('closeBtn');
const fullImg=document.getElementById('fullImg');
const topbar=document.querySelector('.topbar');

profilePic.onclick = () => {
    overlay.style.display = 'flex';
    topbar.classList.add('hidden'); // REMOVE THE TOP
    setTimeout(() => fullImg.style.transform = 'scale(1)', 10);
};

function closeLightbox(){
fullImg.style.transform = 'scale(0.7)';
topbar.classList.remove('hidden'); // RE-ADD THE TOP
setTimeout(() => overlay.style.display = 'none', 300);
}  

closeBtn.onclick=closeLightbox;
overlay.onclick=(e)=>{if(e.target!==fullImg)closeLightbox();}
</script>
