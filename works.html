<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Works | @dyegoou</title>
</head>

<body>

<div class="topbar">
    <a href="index.html" class="logo">Projeto 📚</a>

    <div class="menu-toggle" id="menuToggle">☰</div>

<div class="topbar-right" id="menu">
    <a href="index.html">Menu</a> <!-- NOVO -->
    <a href="aboutme.html">Sobre mim</a>
    <a href="works.html">Works</a>
</div>
</div>

<canvas id="bgCanvas"></canvas>
<div class="glow" id="glow"></div>

<div class="wrapper">
<div class="container">

<h1>Meus Trabalhos</h1>

<div class="work">
    <h3>Projeto 1</h3>
    <p>Descrição do seu projeto aqui.</p>

    <a href="#" class="btn-project open-project"
       data-title="Projeto 1"
       data-desc="Descrição completa do projeto 1.">
       Ver projeto
    </a>
</div>

<div class="work">
    <h3>Projeto 2</h3>
    <p>Outro projeto que você desenvolveu.</p>

    <a href="#" class="btn-project open-project"
       data-title="Projeto 2"
       data-desc="Descrição completa do projeto 2.">
       Ver projeto
    </a>
</div>

</div>
</div>

<!-- MODAL -->
<div class="project-overlay" id="projectOverlay">
    <div class="project-modal">
        <span class="close-project" id="closeProject">&times;</span>

        <h2 id="projectTitle"></h2>
        <p id="projectDesc"></p>
    </div>
</div>

<script>
/* FUNDO */
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2,
speedX: Math.random()-0.5,
speedY: Math.random()-0.5
});
}

function animate(){
ctx.fillStyle="rgba(2,6,23,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.speedX;
p.y+=p.speedY;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

/* GLOW */
const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

/* MENU MOBILE */
const toggle = document.getElementById("menuToggle");
const menu = document.getElementById("menu");

if (toggle && menu) {
    toggle.addEventListener("click", () => {
        menu.classList.toggle("active");
    });
}

/* ===== MODAL PROJETO ===== */
const openBtns = document.querySelectorAll(".open-project");
const overlayProject = document.getElementById("projectOverlay");
const closeProject = document.getElementById("closeProject");

const title = document.getElementById("projectTitle");
const desc = document.getElementById("projectDesc");

openBtns.forEach(btn => {
    btn.addEventListener("click", (e) => {
        e.preventDefault();

        title.innerText = btn.dataset.title;
        desc.innerText = btn.dataset.desc;

        overlayProject.classList.add("active");
    });
});

function closeModal(){
    overlayProject.classList.remove("active");
}

closeProject.onclick = closeModal;

overlayProject.onclick = (e) => {
    if (e.target === overlayProject) closeModal();
};
</script>

</body>
</html>
